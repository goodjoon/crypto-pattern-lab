version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: cpl-postgres
    environment:
      POSTGRES_DB: crypto_pattern_lab
      POSTGRES_USER: cpl
      POSTGRES_PASSWORD: cpl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cpl-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
